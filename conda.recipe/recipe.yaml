context:
  version: "0.1.0"
  mojo_version: "=1.0.0b3.dev2026061706"

package:
  name: "chrono"
  version: ${{ version }}

source:
  - git: https://github.com/Dark-Captcha/chrono-mojo.git
    rev: a6e6822d90be919cf6f38c438aa59859fd1cc6f4

build:
  number: 0
  script:
    - mkdir -p ${{ PREFIX }}/lib/mojo
    - mojo package chrono -o ${{ PREFIX }}/lib/mojo/chrono.mojopkg

requirements:
  build:
    - mojo-compiler ${{ mojo_version }}
  host:
    - mojo-compiler ${{ mojo_version }}
  run:
    - ${{ pin_compatible('mojo-compiler') }}

tests:
  - script:
      - if: unix
        then:
          - mojo run -I . tests/run_tests.mojo
    files:
      source:
        - chrono/
        - tests/
    requirements:
      build:
        - mojo ${{ mojo_version }}
      run:
        - mojo ${{ mojo_version }}

about:
  homepage: https://github.com/Dark-Captcha/chrono-mojo
  license: Apache-2.0
  license_file: LICENSE
  summary: Typed date/time/timezone library for Mojo
  repository: https://github.com/Dark-Captcha/chrono-mojo

extra:
  maintainers:
    - Dark-Captcha
  project_name:
    - chrono-mojo
